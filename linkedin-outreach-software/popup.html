<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkedIn Outreach Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <header class="popup-header">
      <div class="popup-logo">
        <span class="popup-logo-icon">🚀</span>
        <div>
          <h1>Outreach Pro</h1>
          <span class="popup-version">v2.0 • UNLIMITED</span>
        </div>
      </div>
    </header>

    <div class="popup-stats">
      <div class="popup-stat">
        <span class="popup-stat-value" id="popup-leads">0</span>
        <span class="popup-stat-label">Leads</span>
      </div>
      <div class="popup-stat">
        <span class="popup-stat-value" id="popup-campaigns">0</span>
        <span class="popup-stat-label">Active</span>
      </div>
      <div class="popup-stat">
        <span class="popup-stat-value" id="popup-sent">0</span>
        <span class="popup-stat-label">Sent</span>
      </div>
      <div class="popup-stat">
        <span class="popup-stat-value" id="popup-rate">0%</span>
        <span class="popup-stat-label">Response</span>
      </div>
    </div>

    <div class="popup-auto-status" id="popup-auto-status">
      <div class="popup-auto-dot" id="popup-auto-dot"></div>
      <span id="popup-auto-label">Automation: Idle</span>
    </div>

    <div class="popup-actions">
      <button class="popup-btn primary" id="btn-open-sidebar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
        Open Sidebar
      </button>
      <button class="popup-btn secondary" id="btn-quick-save">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/></svg>
        Save Lead
      </button>
    </div>

    <div class="popup-today" id="popup-today">
      <h4>Today's Actions</h4>
      <div class="popup-counter-row">
        <span>Connections</span>
        <span class="popup-counter-val" id="popup-conn-today">0</span>
      </div>
      <div class="popup-counter-row">
        <span>Messages</span>
        <span class="popup-counter-val" id="popup-msg-today">0</span>
      </div>
      <div class="popup-counter-row">
        <span>Profile Views</span>
        <span class="popup-counter-val" id="popup-visit-today">0</span>
      </div>
    </div>

    <footer class="popup-footer">
      <span>Zero limitations. All automation runs locally.</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
