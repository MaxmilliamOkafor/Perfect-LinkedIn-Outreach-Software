<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkedIn Outreach</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <!-- Header -->
    <div class="popup-header">
      <div class="popup-logo">
        <span class="popup-logo-icon">🚀</span>
        <div>
          <h1>LinkedIn Outreach</h1>
          <span class="popup-version">v1.0.0</span>
        </div>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <span class="stat-value" id="stat-leads">0</span>
        <span class="stat-label">Leads Saved</span>
      </div>
      <div class="stat-card">
        <span class="stat-value" id="stat-messages">0</span>
        <span class="stat-label">Messages</span>
      </div>
    </div>

    <!-- AI Status -->
    <div class="ai-status" id="ai-status">
      <div class="ai-status-dot"></div>
      <span id="ai-status-text">AI Ready</span>
      <button class="link-btn" id="btn-setup-ai">Setup</button>
    </div>

    <!-- Quick Actions -->
    <div class="actions">
      <button class="action-btn" id="btn-open-sidebar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
        <span>Open Sidebar</span>
      </button>
      <button class="action-btn" id="btn-export">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <span>Export Leads</span>
      </button>
    </div>

    <!-- Not on LinkedIn -->
    <div class="not-linkedin" id="not-linkedin" style="display:none;">
      <p>Navigate to LinkedIn to start finding contacts and drafting outreach messages.</p>
    </div>

    <!-- Settings Quick Access -->
    <div class="popup-footer">
      <a href="#" id="btn-popup-settings" class="footer-link">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9"/></svg>
        Settings
      </a>
      <span class="footer-divider">•</span>
      <span class="footer-text">Zero limitations</span>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
